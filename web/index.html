<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="开听 — a cross-platform player for local and remote music libraries.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="开听">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>开听</title>
  <link rel="manifest" href="manifest.json">
  <style>
    html, body {
      background: #F7F7F8;
      height: 100%;
      margin: 0;
    }

    #launch-screen {
      align-items: center;
      background: #F7F7F8;
      display: flex;
      flex-direction: column;
      inset: 0;
      justify-content: center;
      position: fixed;
      transition: opacity 180ms ease-out;
      z-index: 9999;
    }

    #launch-screen img {
      height: 144px;
      position: absolute;
      transform: translateY(-50px);
      width: 144px;
    }

    #launch-screen .launch-title {
      color: #1C1C22;
      font: 600 24px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0.2px;
      position: absolute;
      transform: translateY(28px);
    }

    #launch-screen .launch-tagline {
      color: #70707A;
      font: 400 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0.1px;
      position: absolute;
      transform: translateY(58px);
    }

    #launch-screen.is-hidden {
      opacity: 0;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="launch-screen" role="status" aria-label="开听 is starting">
    <img src="icons/LaunchMark.png" alt="">
    <span class="launch-title">开听</span>
    <span class="launch-tagline">听自己的音乐</span>
  </div>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script>
    window.addEventListener('flutter-first-frame', function () {
      const launchScreen = document.getElementById('launch-screen');
      launchScreen.classList.add('is-hidden');
      launchScreen.addEventListener('transitionend', function () {
        launchScreen.remove();
      }, { once: true });
    });
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
